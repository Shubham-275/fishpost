# Pin nixpkgs archive to get Node.js 22.13.1 (Next.js 16 requires >= 20.9.0)
nixpkgsArchive = '51ad838b03a05b1de6f9f2a0fffecee64a9788ee'

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.build]
cmds = ["cd fishposts && npm ci && npm run build"]

[start]
cmd = "cd fishposts && node .next/standalone/server.js"
